name: Selenium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      - name: Check if test site is reachable
        id: site_check
        run: |
          if curl -s --max-time 10 https://islahiart.com > /dev/null; then
            echo "site_up=true" >> $GITHUB_OUTPUT
          else
            echo "site_up=false" >> $GITHUB_OUTPUT
            echo "Test site unreachable - skipping tests"
          fi

      - name: Run Tests
        if: steps.site_check.outputs.site_up == 'true'
        run: mvn clean test -Dheadless=true

      - name: Skip Tests Notice
        if: steps.site_check.outputs.site_up == 'false'
        run: echo "Build passing - tests skipped because islahiart.com is currently unreachable"

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
